# 1. Server Configuration
spring.application.name=e-commerce3
server.port=8080

# 2. Database Connection (Choose ONE - currently set to MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_tpo?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate 7+ Specifics (The fix for your error)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.hibernate.ddl-auto=update 
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# JWT
# Mínimo 32 caracteres para HS256. Cambiar en producción.
jwt.secret=clave-super-secreta-para-firmar-tokens-jwt-minimo-32chars
# Expiración: 86400000 ms = 24 horas
jwt.expiration=86400000


# 4. Security Pepper (Ensuring your Manager works)
app.security.pepper=f7a8b9c2d3e4f5a6b7c8d9e0f1a2b3c4